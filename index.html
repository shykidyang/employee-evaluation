<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门内部互评系统 v2.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-size: 13px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 12px; }
        .login-container { max-width: 420px; margin: 60px auto; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 14px; padding: 28px 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        h1, h2, h3 { color: #2c3e50; }
        h1 { text-align: center; margin-bottom: 6px; font-size: 20px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 20px; font-size: 12px; }
        .btn { padding: 9px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4); }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4); }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 12px; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .alert-info { background: #dbeafe; color: #1e40af; border-left: 4px solid #3b82f6; }
        .header { background: white; border-radius: 12px; padding: 12px 18px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; }
        .user-details h3 { margin: 0; font-size: 15px; }
        .user-details p { margin: 2px 0 0; color: #6b7280; font-size: 11px; }
        .main-content { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 400px; }
        .score-stats { display: flex; gap: 12px; margin-bottom: 14px; padding: 10px; background: #f3f4f6; border-radius: 8px; }
        .score-stat { flex: 1; text-align: center; padding: 8px; border-radius: 6px; }
        .score-stat.high { background: #d1fae5; }
        .score-stat.mid { background: #fef3c7; }
        .score-stat.low { background: #fee2e2; }
        .score-stat-value { font-size: 20px; font-weight: bold; }
        .score-stat-label { font-size: 11px; color: #6b7280; margin-top: 3px; }
        .score-btn-group { display: inline-flex; border-radius: 6px; overflow: hidden; border: 1.5px solid #e0e6ed; }
        .score-btn { padding: 7px 14px; border: none; background: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.2s; }
        .score-btn:not(:last-child) { border-right: 1px solid #e0e6ed; }
        .score-btn:hover { background: #f3f4f6; }
        .score-btn.selected { color: white; }
        .score-btn.selected.score-90 { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .score-btn.selected.score-75 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .score-btn.selected.score-60 { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .evaluation-item { background: #f9fafb; border-radius: 6px; padding: 9px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .employee-info { display: flex; align-items: center; gap: 8px; }
        .employee-avatar { width: 30px; height: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        .employee-name { font-weight: 600; color: #374151; font-size: 13px; }
        .action-buttons { display: flex; gap: 8px; margin-top: 14px; }
        .action-buttons .btn { flex: 1; }
        .rules-box { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-radius: 10px; padding: 14px; margin-bottom: 14px; border-left: 3px solid #f59e0b; }
        .rules-box h4 { color: #92400e; margin-bottom: 6px; font-size: 13px; }
        .rules-box ul { margin-left: 16px; color: #78350f; font-size: 12px; }
        .rules-box li { margin-bottom: 3px; font-size: 12px; }
        .badge { padding: 3px 8px; border-radius: 14px; font-size: 11px; font-weight: 600; }
        .badge-director { background: rgba(79, 70, 229, 0.1); color: #4f46e5; }
        .hidden { display: none !important; }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 14px 24px; border-radius: 10px; color: white; font-weight: 500; z-index: 9999; font-size: 14px; text-align: center; max-width: 80%; animation: slideIn 0.3s, fadeOut 0.5s 4.5s; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .toast-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .toast-error { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 15px; text-align: center; } .evaluation-item { flex-direction: column; gap: 15px; align-items: flex-start; } }
    </style>
</head>
<body>
    <!-- 登录/退出页面 -->
    <div id="loginPage" class="container">
        <div class="login-container">
            <div class="card">
                <h1>&#128202; 部门内部互评系统</h1>
                <p class="subtitle">v2.1</p>
                <div id="logoutNotice" class="hidden" style="text-align:center;padding:20px 0;">
                    <div style="font-size:36px;margin-bottom:10px;">&#128075;</div>
                    <h3 style="color:#374151;margin-bottom:6px;font-size:14px;">已安全退出</h3>
                    <p style="color:#6b7280;">感谢使用部门内部互评系统</p>
                </div>
                <div id="loginError" class="hidden">
                    <div class="alert alert-error" id="errorMessage"></div>
                </div>
                <div id="loginWaiting" style="text-align:center;padding:20px 0;">
                    <p style="color:#6b7280;">请通过邮件中的登录链接访问本系统</p>
                </div>
            </div>
        </div>
    </div>
    <!-- 主界面 -->
    <div id="mainPage" class="container hidden">
        <div class="header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-details">
                    <h3 id="userName">--</h3>
                    <p>员工互评</p>
                </div>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="logout()" style="padding:7px 14px;font-size:12px;">&#128682; 退出</button>
            </div>
        </div>
        <div class="main-content">
            <div class="rules-box">
                <h4>&#9888;&#65039; 评分规则（请严格遵守）</h4>
                <ul>
                    <li><strong>评分档次</strong>：90分（优秀）、75分（良好）、60分（合格）</li>
                    <li><strong>90分</strong>：最多给 <strong>4人</strong>（当前已选：<span id="highScoreCount" class="badge badge-director">0</span>人）</li>
                    <li><strong>60分</strong>：至少给 <strong>2人</strong>（当前已选：<span id="lowScoreCount" class="badge badge-director">0</span>人）</li>
                    <li>请为每位同事选择一个评分档次</li>
                </ul>
            </div>
            <div class="score-stats">
                <div class="score-stat high"><div class="score-stat-value" id="stat90">0</div><div class="score-stat-label">90分（优秀）</div></div>
                <div class="score-stat mid"><div class="score-stat-value" id="stat75">0</div><div class="score-stat-label">75分（良好）</div></div>
                <div class="score-stat low"><div class="score-stat-value" id="stat60">0</div><div class="score-stat-label">60分（合格）</div></div>
            </div>
            <h3>&#128172; 请为每位同事评分</h3>
            <p style="color:#6b7280;margin-bottom:14px;font-size:12px;">点击下方按钮选择评分档次</p>
            <div id="evaluationList"></div>
            <div class="action-buttons">
                <button class="btn btn-success" onclick="submitEvaluations()">&#9989; 提交评价</button>
                <button class="btn btn-secondary" onclick="clearEvaluations()">&#128465; 清空</button>
            </div>
        </div>
    </div>
<script>
    const DEFAULT_EMPLOYEES = [
        { id: '1', name: '杨洪均', role: 'director', phone: '13388110096', email: '13388110096@189.cn' },
        { id: '2', name: '钟洪明', role: 'deputy', phone: '13320882361', email: 'myzhonghongming.sc@chinatelecom.cn' },
        { id: '3', name: '陈刚', role: 'staff', phone: '13388110507', email: 'mychengang2.sc@chinatelecom.cn' },
        { id: '4', name: '陈鑫瑜', role: 'staff', phone: '13388115152', email: 'chenxy54@chinatelecom.cn' },
        { id: '5', name: '张跃', role: 'staff', phone: '15308333709', email: 'myzhangyue.sc@chinatelecom.cn' },
        { id: '6', name: '梁峻', role: 'staff', phone: '13388110452', email: 'myliangjun.sc@chinatelecom.cn' },
        { id: '7', name: '未小军', role: 'staff', phone: '13388110505', email: 'myweixiaojun.sc@chinatelecom.cn' },
        { id: '8', name: '周密', role: 'staff', phone: '13388110534', email: 'myzhoumi.sc@chinatelecom.cn' },
        { id: '9', name: '王涛', role: 'staff', phone: '13388111868', email: 'my_wangtao.sc@chinatelecom.cn' },
        { id: '10', name: '刘海', role: 'staff', phone: '13320882424', email: 'myliuhai.sc@chinatelecom.cn' },
        { id: '11', name: '吴波', role: 'staff', phone: '13388110528', email: 'mywubo.sc@chinatelecom.cn' },
        { id: '12', name: '高竹英', role: 'staff', phone: '13388111635', email: 'mygaozhuying.sc@chinatelecom.cn' },
        { id: '13', name: '杜小东', role: 'staff', phone: '13388113150', email: 'myduxiaodong.sc@chinatelecom.cn' },
        { id: '14', name: '张艺林', role: 'staff', phone: '13388113568', email: 'zhangyl51@chinatelecom.cn' }
    ];

    const SCORE_RULES = { HIGH_MAX: 4, LOW_MIN: 2 };
    const STATE_KEY = 'evaluation_v2_data';
    const JSONBIN_ID = '69e9cde0856a68218963330c';
    const JSONBIN_API_KEY = '$2a$10$3x6ustM943wc8LFtNcb/I.L.acCynFMMqwi627g4miJe3ssd7mh0a';
    const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID + '/latest';
    const JSONBIN_UPDATE_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;
    let EMPLOYEES = [];
    let currentUser = null;
    let systemData = null;
    let saveTimer = null; // 防抖计时器

    function init() {
        loadEmployees();
        const urlParams = new URLSearchParams(window.location.search);
        const loginToken = urlParams.get('token');
        if (loginToken) { handleLinkLogin(loginToken); return; }
        const savedUser = localStorage.getItem('current_user_v2');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            if (EMPLOYEES.some(e => e.id === user.id)) {
                currentUser = user;
                loadState().then(() => { showMainInterface(); });
                return;
            }
        }
        showLoginInterface();
    }

    function loadEmployees() {
        const saved = localStorage.getItem('employees_v2_data');
        EMPLOYEES = saved ? JSON.parse(saved) : [...DEFAULT_EMPLOYEES];
        if (!saved) localStorage.setItem('employees_v2_data', JSON.stringify(EMPLOYEES));
    }
    function loadState() {
        const saved = localStorage.getItem(STATE_KEY);
        systemData = saved ? JSON.parse(saved) : { evaluations: {}, lastUpdated: new Date().toISOString() };
        // 异步从云端拉取最新数据，返回 Promise
        return fetchJSONBin();
    }
    async function fetchJSONBin() {
        const headers = { 'Content-Type': 'application/json' };
        if (JSONBIN_API_KEY) headers['X-Master-Key'] = JSONBIN_API_KEY;
        for (let retry = 0; retry < 3; retry++) {
            try {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 15000); // 15秒超时（JSONBin响应慢）
                const res = await fetch(JSONBIN_URL, { headers, signal: controller.signal });
                clearTimeout(timer);
                if (!res.ok) { if (retry < 2) await new Promise(r => setTimeout(r, 500)); continue; }
                const json = await res.json();
                if (json.record && json.record.evaluations) {
                    const cloudData = json.record;
                    if (!systemData.lastUpdated || cloudData.lastUpdated > systemData.lastUpdated) {
                        systemData = cloudData;
                        localStorage.setItem(STATE_KEY, JSON.stringify(systemData));
                    }
                    // 云端 employees 存在时覆盖本地（员工端以云端为准）
                    if (cloudData.employees && cloudData.employees.length > 0) {
                        EMPLOYEES = cloudData.employees;
                        localStorage.setItem('employees_v2_data', JSON.stringify(EMPLOYEES));
                    }
                }
                return; // 成功则退出
            } catch (e) {
                if (retry < 2) await new Promise(r => setTimeout(r, 500 * (retry + 1)));
            }
        }
        console.warn('fetchJSONBin: 3次重试均失败，使用本地数据');
    }
    function saveState() {
        systemData.lastUpdated = new Date().toISOString();
        localStorage.setItem(STATE_KEY, JSON.stringify(systemData));
        // 防抖：1秒内只上传一次
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(pushToJSONBin, 1000);
    }
    async function pushToJSONBin() {
        if (!JSONBIN_API_KEY) return;
        const headers = { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY };
        for (let retry = 0; retry < 3; retry++) {
            try {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 20000);
                const res = await fetch(JSONBIN_UPDATE_URL, {
                    method: 'PUT',
                    headers,
                    signal: controller.signal,
                    body: JSON.stringify(systemData)
                });
                clearTimeout(timer);
                if (res.ok) return;
                await new Promise(r => setTimeout(r, 1000 * (retry + 1)));
            } catch (netErr) {
                if (retry === 2) { showToast('数据保存到云端失败，已存本地，请检查网络', 'warning'); return; }
                await new Promise(r => setTimeout(r, 1000 * (retry + 1)));
            }
        }
    }

    function showLoginInterface() {
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('logoutNotice').classList.add('hidden');
        document.getElementById('loginWaiting').classList.remove('hidden');
    }

    function showMainInterface() {
        if (!systemData) systemData = JSON.parse(localStorage.getItem(STATE_KEY) || 'null') || { evaluations: {}, lastUpdated: new Date().toISOString() };
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('userAvatar').textContent = currentUser.name[0];
        document.getElementById('userName').textContent = currentUser.name;
        initEvaluationPage();
    }

    async function handleLinkLogin(token) {
        // 先显示加载状态
        showLoginInterface();
        document.getElementById('loginWaiting').innerHTML = '<div class="spinner"></div> 正在验证登录信息...';
        document.getElementById('loginWaiting').classList.remove('hidden');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('logoutNotice').classList.add('hidden');
        try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(token))));
            if (!decoded.id || !decoded.name || !decoded.role) throw new Error('缺少必要字段');
            if (decoded.role === 'director') throw new Error('请使用管理员页面登录');
            // 先用本地 employees 校验，不等云端（避免 JSONBin 慢导致超时）
            let empExists = EMPLOYEES.some(e => e.id === decoded.id && e.name === decoded.name);
            if (!empExists) {
                // 本地没有，尝试从云端拉（只等一次，15秒超时）
                document.getElementById('loginWaiting').innerHTML = '<div class="spinner"></div> 本地未找到，正在从云端同步...';
                await fetchJSONBin();
                empExists = EMPLOYEES.some(e => e.id === decoded.id && e.name === decoded.name);
            }
            if (!empExists) throw new Error('员工不存在');
            // 从 EMPLOYEES 获取完整信息（含 email）
            const emp = EMPLOYEES.find(e => e.id === decoded.id);
            currentUser = { id: emp.id, name: emp.name, role: emp.role, email: emp.email || '' };
            localStorage.setItem('current_user_v2', JSON.stringify(currentUser));
            const url = new URL(window.location.href);
            url.searchParams.delete('token');
            window.history.replaceState({}, '', url.pathname);
            // 确保 systemData 已初始化
            if (!systemData) systemData = JSON.parse(localStorage.getItem(STATE_KEY) || 'null') || { evaluations: {}, lastUpdated: new Date().toISOString() };
            showMainInterface();
            // 登录成功后，后台异步同步云端数据
            fetchJSONBin();
        } catch (e) {
            console.error('登录链接解析失败:', e);
            showLoginInterface();
            document.getElementById('loginWaiting').classList.add('hidden');
            document.getElementById('loginError').classList.remove('hidden');
            document.getElementById('errorMessage').innerHTML = '&#10060; 登录链接无效 (' + (e.message || '未知错误') + ')，请联系管理员重新发送';
        }
    }

    function logout() {
        localStorage.removeItem('current_user_v2');
        currentUser = null;
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('loginWaiting').classList.add('hidden');
        document.getElementById('logoutNotice').classList.remove('hidden');
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = 'toast toast-' + (type || 'info');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 5000);
    }

    function initEvaluationPage() {
        const list = document.getElementById('evaluationList');
        list.innerHTML = '';

        // 副职/普通员工：只看到 staff 角色
        document.querySelector('.rules-box').style.display = '';
        document.getElementById('userName').textContent = currentUser.name;
        let evaluatees = [];
        if (currentUser.role === 'deputy') {
            evaluatees = EMPLOYEES.filter(e => e.role === 'staff');
        } else {
            evaluatees = EMPLOYEES.filter(e => e.role === 'staff' && e.id !== currentUser.id);
        }
        const myEval = systemData.evaluations[currentUser.id] || {};
        evaluatees.forEach(emp => {
            const s = myEval[emp.id] || null;
            list.innerHTML += '<div class="evaluation-item"><div class="employee-info"><div class="employee-avatar">' + emp.name[0] + '</div><div class="employee-name">' + emp.name + '</div></div><div><div class="score-btn-group">' +
                '<button class="score-btn score-90 ' + (s === 90 ? 'selected' : '') + '" onclick="setScore(\'' + emp.id + '\',90)">90</button>' +
                '<button class="score-btn score-75 ' + (s === 75 ? 'selected' : '') + '" onclick="setScore(\'' + emp.id + '\',75)">75</button>' +
                '<button class="score-btn score-60 ' + (s === 60 ? 'selected' : '') + '" onclick="setScore(\'' + emp.id + '\',60)">60</button></div></div></div>';
        });
        updateScoreCounts();
    }

    function setScore(empId, score) {
        const myEval = systemData.evaluations[currentUser.id] || {};
        const oldScore = myEval[empId];
        let counts = { 90: 0, 75: 0, 60: 0 };
        Object.values(myEval).forEach(s => { if (s === 90) counts[90]++; else if (s === 75) counts[75]++; else if (s === 60) counts[60]++; });
        if (oldScore === score) { delete myEval[empId]; systemData.evaluations[currentUser.id] = myEval; saveState(); updateScoreCounts(); initEvaluationPage(); return; }
        if (oldScore) counts[oldScore]--;
        if (score === 90 && counts[90] >= SCORE_RULES.HIGH_MAX) { showToast('90分档位最多只能选择 ' + SCORE_RULES.HIGH_MAX + ' 人', 'warning'); return; }
        if (oldScore === 60 && counts[60] < SCORE_RULES.LOW_MIN) { showToast('60分档位必须至少选择 ' + SCORE_RULES.LOW_MIN + ' 人', 'warning'); return; }
        myEval[empId] = score;
        systemData.evaluations[currentUser.id] = myEval;
        saveState(); updateScoreCounts(); initEvaluationPage();
    }

    function updateScoreCounts() {
        const myEval = systemData.evaluations[currentUser.id] || {};
        let c90 = 0, c75 = 0, c60 = 0;
        Object.values(myEval).forEach(s => { if (s === 90) c90++; else if (s === 75) c75++; else if (s === 60) c60++; });
        document.getElementById('highScoreCount').textContent = c90;
        document.getElementById('lowScoreCount').textContent = c60;
        document.getElementById('stat90').textContent = c90;
        document.getElementById('stat75').textContent = c75;
        document.getElementById('stat60').textContent = c60;
    }

    async function submitEvaluations() {
        const myEval = systemData.evaluations[currentUser.id] || {};
        const evaluated = Object.keys(myEval).length;
        if (evaluated === 0) { showToast('请先为至少一位同事评分', 'warning'); return; }
        let c90 = 0, c60 = 0;
        Object.values(myEval).forEach(s => { if (s === 90) c90++; if (s === 60) c60++; });
        if (c90 > SCORE_RULES.HIGH_MAX) { showToast('90分最多 ' + SCORE_RULES.HIGH_MAX + ' 人，当前选了 ' + c90 + ' 人', 'error'); return; }
        if (c60 < SCORE_RULES.LOW_MIN) { showToast('60分至少 ' + SCORE_RULES.LOW_MIN + ' 人，当前只选了 ' + c60 + ' 人', 'error'); return; }

        // 评分时已自动保存到本地和云端，提交按钮做最终确认
        saveState();
        showToast('评价已成功提交！', 'success');
    }

    function clearEvaluations() {
        systemData.evaluations[currentUser.id] = {};
        saveState(); initEvaluationPage();
        showToast('已清空评分', 'info');
    }

    init();
</script>
</body>
</html>
